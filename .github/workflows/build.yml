name: Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    name: Build and test ${{ matrix.variant }}
    runs-on: windows-2025-vs2026
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: shared
            preset: windows-shared
            package: hlmedia-windows-shared-x64
          - variant: game-static
            preset: windows-game-static
            package: hlmedia-windows-game-static-x64

    steps:
      - name: Checkout hlmedia
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up MSVC
        uses: vln-devsecops/actions-msvc@release/v1
        with:
          arch: x64

      - name: Download HashLink
        shell: pwsh
        run: ./scripts/ci/download-hashlink.ps1

      - name: Download FFmpeg LGPL shared SDK
        if: matrix.variant == 'shared'
        shell: pwsh
        run: ./scripts/ci/download-ffmpeg-shared.ps1

      - name: Set up MSYS2
        if: matrix.variant == 'game-static'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          path-type: inherit
          install: make diffutils patch tar xz

      - name: Read pinned FFmpeg revision
        if: matrix.variant == 'game-static'
        id: ffmpeg
        shell: pwsh
        run: |
          $commit = ((Get-Content deps/ffmpeg/VERSION -Raw).Trim() -split '\s+')[0]
          "commit=$commit" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Restore static FFmpeg SDK
        if: matrix.variant == 'game-static'
        id: ffmpeg-cache
        uses: actions/cache@v5
        with:
          path: out/deps/ffmpeg-game-static
          key: ${{ runner.os }}-x64-vs2026-ffmpeg-${{ steps.ffmpeg.outputs.commit }}-${{ hashFiles('deps/ffmpeg/build-game-static.sh', 'deps/ffmpeg/patches/**') }}

      - name: Validate cached static FFmpeg SDK
        if: matrix.variant == 'game-static' && steps.ffmpeg-cache.outputs.cache-hit == 'true'
        shell: pwsh
        run: |
          $actual = (Get-Content out/deps/ffmpeg-game-static/build-info/FFMPEG-COMMIT.txt -Raw).Trim()
          if ($actual -ne '${{ steps.ffmpeg.outputs.commit }}') { throw "Cached FFmpeg commit $actual does not match the pin." }

      - name: Checkout pinned FFmpeg source
        if: matrix.variant == 'game-static' && steps.ffmpeg-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          git init out/deps/ffmpeg-source
          git -C out/deps/ffmpeg-source remote add origin https://github.com/FFmpeg/FFmpeg.git
          git -C out/deps/ffmpeg-source fetch --depth 1 origin ${{ steps.ffmpeg.outputs.commit }}
          git -C out/deps/ffmpeg-source checkout --detach FETCH_HEAD

      - name: Build static FFmpeg SDK
        if: matrix.variant == 'game-static' && steps.ffmpeg-cache.outputs.cache-hit != 'true'
        shell: msys2 {0}
        env:
          FFMPEG_SOURCE: ${{ github.workspace }}/out/deps/ffmpeg-source
          FFMPEG_BUILD_DIR: ${{ github.workspace }}/out/deps/ffmpeg-game-build
          FFMPEG_INSTALL_DIR: ${{ github.workspace }}/out/deps/ffmpeg-game-static
        run: bash ./deps/ffmpeg/build-game-static.sh

      - name: Export FFmpeg SDK root
        if: matrix.variant == 'game-static'
        shell: pwsh
        run: |
          "FFMPEG_GAME_STATIC_ROOT=${{ github.workspace }}/out/deps/ffmpeg-game-static" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure CMake
        shell: pwsh
        run: |
          $root = if ('${{ matrix.variant }}' -eq 'shared') { $env:FFMPEG_SHARED_ROOT } else { $env:FFMPEG_GAME_STATIC_ROOT }
          cmake --preset ${{ matrix.preset }} -DFFMPEG_ROOT="$root"

      - name: Build hlmedia
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Stage package
        shell: pwsh
        run: ./scripts/ci/stage-package.ps1 -Variant ${{ matrix.variant }} -Preset ${{ matrix.preset }} -OutputDirectory dist/${{ matrix.package }}

      - name: Verify package dependencies
        shell: pwsh
        run: ./scripts/ci/verify-package.ps1 -Variant ${{ matrix.variant }} -Directory dist/${{ matrix.package }}

      - name: Set up Haxe
        uses: krdlab/setup-haxe@master
        with:
          haxe-version: latest

      - name: Install Haxe libraries
        run: haxelib install heaps --quiet --always

      - name: Run Haxe/native tests
        shell: pwsh
        env:
          HLMEDIA_EXPECTED_DISTRIBUTION: ${{ matrix.variant == 'shared' && 'SHARED' || 'GAME' }}
        run: |
          Copy-Item "dist/${{ matrix.package }}/*" tests/testMain -Force
          Push-Location tests/testMain
          haxe test-hl.hxml
          hl test.hl
          Pop-Location

      - name: Upload runtime package
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.package }}
          path: dist/${{ matrix.package }}

  release:
    name: Publish release assets
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: windows-2025-vs2026
    env:
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create runtime archives
        shell: pwsh
        run: |
          foreach ($name in 'hlmedia-windows-shared-x64', 'hlmedia-windows-game-static-x64') {
            Compress-Archive -Path "artifacts/$name" -DestinationPath "$name.zip" -CompressionLevel Optimal
          }

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$env:GITHUB_REF_NAME" *> $null
          if ($LASTEXITCODE) { gh release create "$env:GITHUB_REF_NAME" --title "$env:GITHUB_REF_NAME" --generate-notes }
          gh release upload "$env:GITHUB_REF_NAME" hlmedia-windows-shared-x64.zip hlmedia-windows-game-static-x64.zip --clobber

      - name: Publish nightly release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view nightly *> $null
          if ($LASTEXITCODE) { gh release create nightly --prerelease --title "Nightly Release" --notes "Automated build from main." }
          gh release upload nightly hlmedia-windows-shared-x64.zip hlmedia-windows-game-static-x64.zip --clobber
