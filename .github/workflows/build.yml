name: Build

on:
  workflow_dispatch:
  push:
  pull_request:
  release:
    types:
      - published

permissions:
  contents: write

env:
  FFMPEG_URL: https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-lgpl-shared.zip

jobs:
  build:
    name: Build Windows package
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up MSVC
        uses: vln-devsecops/actions-msvc@release/v1
        with:
          arch: x64

      - name: Download HashLink
        shell: pwsh
        run: |
          $release = Invoke-RestMethod -Uri 'https://api.github.com/repos/HaxeFoundation/hashlink/releases/latest'
          $asset = $release.assets | Where-Object { $_.name -like 'hashlink-*-win.zip' } | Select-Object -First 1
          if (-not $asset) {
            throw 'Could not find a Windows HashLink release asset.'
          }

          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile 'hashlink-win.zip'
          Expand-Archive -LiteralPath 'hashlink-win.zip' -DestinationPath 'hashlink' -Force

          $hashlinkDir = Get-ChildItem -Path 'hashlink' -Directory | Select-Object -First 1
          if (-not $hashlinkDir) {
            throw 'Could not locate the extracted HashLink directory.'
          }

          "HASHLINK=$($hashlinkDir.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$($hashlinkDir.FullName)" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Download FFmpeg LGPL shared SDK
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path 'out/deps' | Out-Null
          Invoke-WebRequest -Uri $env:FFMPEG_URL -OutFile 'out/deps/ffmpeg-shared.zip'
          Expand-Archive -LiteralPath 'out/deps/ffmpeg-shared.zip' -DestinationPath 'out/deps' -Force

          $ffmpegDir = Get-ChildItem -Path 'out/deps' -Directory |
            Where-Object { (Test-Path (Join-Path $_.FullName 'include/libavcodec/avcodec.h')) -and (Test-Path (Join-Path $_.FullName 'lib/avcodec.lib')) } |
            Select-Object -First 1

          if (-not $ffmpegDir) {
            throw 'Could not locate extracted FFmpeg LGPL shared SDK include/lib directories.'
          }

          "FFMPEG_ROOT=$($ffmpegDir.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure CMake
        shell: pwsh
        run: cmake --preset release -DFFMPEG_ROOT="$env:FFMPEG_ROOT"

      - name: Build release
        run: cmake --build out/build/release --config Release

      - name: Stage package
        shell: pwsh
        run: |
          $packageDir = 'dist/hlmedia-windows'
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          New-Item -ItemType Directory -Force -Path "$packageDir/hlmedia" | Out-Null

          Copy-Item 'out/build/release/native/Release/hlmedia.hdll' "$packageDir/hlmedia.hdll" -Force
          Copy-Item 'out/build/release/native/Release/hlmedia.lib' "$packageDir/hlmedia.lib" -Force

          foreach ($dll in @('avcodec-*.dll', 'avformat-*.dll', 'avutil-*.dll', 'swresample-*.dll', 'swscale-*.dll')) {
            Copy-Item "$env:FFMPEG_ROOT/bin/$dll" $packageDir -Force
          }

          Copy-Item 'LICENSE' "$packageDir/LICENSE" -Force
          Copy-Item 'LICENSE_FFMPEG.md' "$packageDir/LICENSE_FFMPEG.md" -Force

      - name: Create release zip
        shell: pwsh
        run: |
          if (Test-Path 'hlmedia-windows.zip') {
            Remove-Item 'hlmedia-windows.zip' -Force
          }
          Compress-Archive -Path 'dist/hlmedia-windows/*' -DestinationPath 'hlmedia-windows.zip'

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: hlmedia-windows
          path: hlmedia-windows.zip

      - name: Update nightly release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: andelf/nightly-release@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: nightly
          name: Nightly Release
          body: |
            Automated nightly Windows build of `hlmedia`.

            Download `hlmedia-windows.zip` and extract it into your game's native/bin folder.
            The package uses shared LGPL FFmpeg DLLs and includes `LICENSE` and `LICENSE_FFMPEG.md`.
          files: |
            hlmedia-windows.zip
